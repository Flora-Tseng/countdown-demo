<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Red+Rose:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      color: #fff;
      font-family: system-ui, -apple-system, "Helvetica Neue", sans-serif;
    }

    body {
      background:
        radial-gradient(ellipse at 30% 20%, rgba(40, 60, 100, 0.25), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(20, 40, 80, 0.3), transparent 60%),
        #000;
      position: relative;
    }

    /* 中心微光 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 50% 50%, rgba(120, 180, 255, 0.18), transparent 55%);
      z-index: 1;
      animation: corePulse 6s ease-in-out infinite;
    }

    @keyframes corePulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    /* 粒子容器 */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .particles span {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220,240,255,1) 0%, rgba(150,200,255,0.6) 40%, transparent 70%);
      opacity: 0;
      transform: translate(-50%, -50%);
      animation: emanate 7s linear infinite;
      box-shadow: 0 0 6px rgba(200, 230, 255, 0.6);
    }

    @keyframes emanate {
      0%   { transform: translate(-50%, -50%) translate(0, 0) scale(0.2); opacity: 0; }
      10%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translate(-50%, -50%) translate(var(--dx), var(--dy)) scale(1); opacity: 0; }
    }

    .page { position: relative; z-index: 2; }

    .page {
      position: relative;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: row;
      padding: 80px;
      box-sizing: border-box;
    }

    .page-header {
      position: absolute;
      top: 80px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      font-family: 'Red Rose', serif;
      z-index: 10;
      pointer-events: none;
    }

    .page-header h1 {
      margin: 0;
      font-size: clamp(27px, 3.72vw, 51px);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 700;
      text-align: center;
      align-self: center;
    }

    .page-header .subtitle {
      margin: 6px 0 0;
      font-size: clamp(17px, 1.69vw, 23px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0.85;
      text-align: center;
      align-self: center;
    }

    .hoki {
      position: absolute;
      bottom: 50px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: auto;
      pointer-events: none;
      z-index: 10;
    }

    .top {
      position: relative;
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
      padding: 100px;
      box-sizing: border-box;
      font-family: 'Red Rose', serif;
      text-align: left;
    }

    .top .title-block { align-items: flex-start; }
    .top .days { align-items: flex-start; }

    .edit-btn {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .edit-btn:hover {
      transform: scale(1.5);
      background: rgba(255, 255, 255, 0.5);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 32px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .modal h2 {
      margin: 0;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
    }

    .spin-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      justify-content: center;
    }

    .spin-sep {
      color: #fff;
      font-size: 22px;
      padding-bottom: 28px;
    }

    .spin-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .spin-field button {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 4px 8px;
      font-family: inherit;
      transition: opacity 0.15s;
      opacity: 0.7;
    }

    .spin-field button:hover {
      opacity: 1;
    }

    .spin-value {
      font-size: 24px;
      font-weight: 400;
      color: #fff;
      line-height: 1;
      text-align: center;
      font-variant-numeric: tabular-nums;
      min-width: 2.2ch;
    }

    .spin-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: #fff;
      margin-top: 4px;
      text-align: center;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .modal-actions button {
      font-family: inherit;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      padding: 8px 18px;
    }

    .btn-cancel {
      background: transparent;
      color: #fff;
    }

    .btn-save {
      background: #AE0101;
      color: #fff;
    }

    /* ── RWD ── */
    /* 中型螢幕（平板橫向）：縮減左側 padding */
    @media (max-width: 1200px) {
      .top { padding: 60px; }
      .page { padding: 50px; }
      .hoki { bottom: 50px; width: 100px; }
      .page-header { top: 50px; }
    }

    /* 平板直向以下：改為上下堆疊 */
    @media (max-width: 900px) {
      .page {
        flex-direction: column;
        padding: 30px;
        padding-top: 140px;
      }
      .page-header { top: 30px; }
      .top {
        flex: 0 0 auto;
        padding: 20px;
        align-items: center;
        text-align: center;
      }
      .top .title-block,
      .top .days,
      .top h1,
      .top .subtitle,
      .top .days .label {
        align-self: center;
        text-align: center;
      }
      .bottom {
        flex: 1 1 auto;
        width: 100%;
        padding: 0;
      }
      .bottom iframe {
        max-height: 100%;
      }
      .hoki {
        width: 80px;
        bottom: 30px;
      }
    }

    /* 手機 */
    @media (max-width: 480px) {
      .page { padding: 16px; }
      .top { padding: 12px; gap: 16px; }
      .top h1 { font-size: 18px; }
      .top .subtitle { font-size: 11px; }
      .top .days .num { font-size: 108px; }
      .top .days .label { font-size: 21px; }
      .hoki { width: 60px; bottom: 20px; }
      .modal { min-width: auto; padding: 24px; margin: 16px; }
      .spin-row { gap: 4px; }
      .spin-value { font-size: 20px; }
    }

    .top h1 {
      margin: 0;
      font-size: clamp(21px, 2.86vw, 39px);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: 700;
      text-align: left;
      align-self: flex-start;
    }

    .top .subtitle {
      margin: 6px 0 0;
      font-size: clamp(13px, 1.3vw, 18px);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #fff;
      opacity: 0.85;
      text-align: left;
      align-self: flex-start;
    }

    .top .title-block {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top .days {
      margin: 0;
      display: flex;
      flex-direction: column-reverse;
      align-items: flex-start;
      gap: 8px;
      line-height: 1;
    }

    .top .days .num {
      font-size: clamp(125px, 23.4vw, 312px);
      font-weight: 700;
      color: #AE0101;
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .top .days .label {
      font-size: clamp(27px, 3.12vw, 44px);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #fff;
      text-align: left;
      align-self: flex-start;
    }

    .bottom {
      flex: 0 0 60%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      padding: 0;
      box-sizing: border-box;
      overflow: hidden;
    }

    .bottom iframe {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      max-width: 100%;
      max-height: 100%;
      border: 0;
      display: block;
      background: transparent;
      margin: auto;
      transform: translateY(50px);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="title-block page-header">
      <h1>One Team · Zero-Shot</h1>
      <p class="subtitle">Madison Huang Visit Countdown</p>
    </div>

    <div class="top">
      <p class="days">
        <span class="num" id="days">--</span>
        <span class="label">Days</span>
      </p>
      <button class="edit-btn" id="editBtn" aria-label="Edit countdown target"></button>
    </div>

    <div class="particles" id="particles"></div>

    <img class="hoki" src="HOKI.gif" alt="HOKI" />

    <div class="bottom">
      <iframe
        src="https://notion-achievement-wall.vercel.app"
        loading="lazy"
        allow="fullscreen"
        scrolling="no"
      ></iframe>
    </div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <h2>Set Countdown Target</h2>
      <div class="spin-row" id="spinRow"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelBtn">Cancel</button>
        <button class="btn-save" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ── 粒子：從中心散發 ──
    (function spawnParticles() {
      const container = document.getElementById('particles');
      const COUNT = 80;
      for (let i = 0; i < COUNT; i++) {
        const s = document.createElement('span');
        const angle = Math.random() * Math.PI * 2;
        const distance = 300 + Math.random() * 700; // px
        const dx = Math.cos(angle) * distance;
        const dy = Math.sin(angle) * distance;
        const duration = 5 + Math.random() * 6;
        const delay = -Math.random() * duration;
        const size = 2 + Math.random() * 5;
        s.style.setProperty('--dx', dx + 'px');
        s.style.setProperty('--dy', dy + 'px');
        s.style.width = size + 'px';
        s.style.height = size + 'px';
        s.style.animationDuration = duration + 's';
        s.style.animationDelay = delay + 's';
        container.appendChild(s);
      }
    })();
  </script>

  <script>
    const STORAGE_KEY = 'countdown-target-local';
    const DEFAULT_TARGET = '2026-05-25T00:00';

    function getTarget() {
      return localStorage.getItem(STORAGE_KEY) || DEFAULT_TARGET;
    }

    function update() {
      const target = new Date(getTarget());
      const diff = target - new Date();
      const days = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
      document.getElementById('days').textContent = String(days).padStart(2, '0');
    }

    update();
    setInterval(update, 60 * 1000);

    const backdrop = document.getElementById('modalBackdrop');
    const spinRow = document.getElementById('spinRow');

    // 暫存編輯中的日期
    let editing = new Date(getTarget());

    function fmt(d) {
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0') + 'T' +
        String(d.getHours()).padStart(2, '0') + ':' +
        String(d.getMinutes()).padStart(2, '0');
    }

    const FIELDS = [
      { label: 'YEAR', get: d => d.getFullYear(),    inc: d => d.setFullYear(d.getFullYear() + 1), dec: d => d.setFullYear(d.getFullYear() - 1) },
      { label: 'MON',  get: d => d.getMonth() + 1,   inc: d => d.setMonth(d.getMonth() + 1),       dec: d => d.setMonth(d.getMonth() - 1)   },
      { label: 'DAYS', get: d => d.getDate(),        inc: d => d.setDate(d.getDate() + 1),         dec: d => d.setDate(d.getDate() - 1)     },
      { label: 'HOUR', get: d => d.getHours(),       inc: d => d.setHours(d.getHours() + 1),       dec: d => d.setHours(d.getHours() - 1)   },
      { label: 'MINS', get: d => d.getMinutes(),     inc: d => d.setMinutes(d.getMinutes() + 1),   dec: d => d.setMinutes(d.getMinutes() - 1) },
    ];

    function renderSpinner() {
      spinRow.innerHTML = '';
      FIELDS.forEach((f, i) => {
        if (i > 0) {
          const sep = document.createElement('div');
          sep.className = 'spin-sep';
          sep.textContent = (i === 3) ? ':' : (i === 4 ? ':' : '/');
          spinRow.appendChild(sep);
        }
        const wrap = document.createElement('div');
        wrap.className = 'spin-field';

        const up = document.createElement('button');
        up.textContent = '▲';
        up.addEventListener('click', () => { f.inc(editing); renderSpinner(); });

        const valWrap = document.createElement('div');
        const val = document.createElement('div');
        val.className = 'spin-value';
        val.textContent = String(f.get(editing)).padStart(2, '0');
        const lbl = document.createElement('div');
        lbl.className = 'spin-label';
        lbl.textContent = f.label;
        valWrap.appendChild(val);
        valWrap.appendChild(lbl);

        const down = document.createElement('button');
        down.textContent = '▼';
        down.addEventListener('click', () => { f.dec(editing); renderSpinner(); });

        wrap.appendChild(up);
        wrap.appendChild(valWrap);
        wrap.appendChild(down);
        spinRow.appendChild(wrap);
      });
    }

    document.getElementById('editBtn').addEventListener('click', () => {
      editing = new Date(getTarget());
      renderSpinner();
      backdrop.classList.add('open');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      backdrop.classList.remove('open');
    });

    document.getElementById('saveBtn').addEventListener('click', () => {
      localStorage.setItem(STORAGE_KEY, fmt(editing));
      update();
      backdrop.classList.remove('open');
    });

    backdrop.addEventListener('click', (e) => {
      if (e.target === backdrop) backdrop.classList.remove('open');
    });
  </script>
</body>
</html>
